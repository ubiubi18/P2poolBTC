[Unit]
Requires=bitcoind-pohw-experiment-1.service
After=bitcoind-pohw-experiment-1.service
ConditionPathExists=
ConditionPathExists=/etc/pohw/enable-experiment-1-mining

[Service]
SupplementaryGroups=bitcoin-pohw-rpc
ExecStartPre=/usr/bin/python3 -I /usr/local/libexec/p2pool-experiment-1/pohw-experiment-1-launch-policy.py /usr/local/libexec/p2pool-experiment-1/compatibility/experiment-1-launch-policy.json --repo-root /usr/local/libexec/p2pool-experiment-1 --readiness-car /etc/pohw/experiment-1-deployment-readiness.car --readiness-evidence-car /etc/pohw/experiment-1-deployment-readiness-evidence.car --governance-cli /usr/local/libexec/p2pool-experiment-1/pohw-governance --idena-anchor-policy /etc/pohw/idena-anchor-policy-v2.json --require-ready
ExecStartPre=/usr/local/libexec/p2pool-experiment-1/p2pool-node verify-idena-registry-deployment --idena-anchor-policy /etc/pohw/idena-anchor-policy-v2.json --idena-rpc-url http://127.0.0.1:9009 --idena-api-key-file /etc/pohw/secrets/idena-api.key
