[Unit]
RequiresMountsFor=
RequiresMountsFor=/var/lib/idena /var/lib/pohw-p2pool/rewards

[Service]
WorkingDirectory=/opt/p2pool/pohw_idena_rpc
ExecStart=
ExecStart=/usr/bin/python3 /opt/p2pool/pohw_idena_rpc/idena_reward_indexer.py --db /var/lib/pohw-p2pool/rewards/reward_ledger.sqlite3 --rolling-data-dir /var/lib/pohw-p2pool/rewards/rolling --rpc-url http://127.0.0.1:9009 --api-key-file /var/lib/idena/api.key --poll-interval 5 run
ReadOnlyPaths=
ReadOnlyPaths=/opt/p2pool /var/lib/idena
ReadWritePaths=
ReadWritePaths=/var/lib/pohw-p2pool/rewards
