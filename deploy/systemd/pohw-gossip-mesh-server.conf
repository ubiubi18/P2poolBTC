[Unit]
Wants=network-online.target
After=network-online.target
RequiresMountsFor=
RequiresMountsFor=/srv/sharechain

[Service]
User=pohw
Group=pohw
WorkingDirectory=/opt/p2pool
Environment=POHW_P2POOL_NODE_BIN=/usr/local/libexec/p2pool-experiment-1/p2pool-node
ExecStart=
ExecStart=/usr/local/libexec/p2pool-experiment-1/pohw-run-gossip-mesh.sh
ReadOnlyPaths=
ReadOnlyPaths=/opt/p2pool /etc/pohw /usr/local/libexec/p2pool-experiment-1
ReadWritePaths=
ReadWritePaths=/srv/sharechain
