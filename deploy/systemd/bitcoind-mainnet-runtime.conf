[Service]
# Avoid invoking a login shell from systemd and avoid RPC-dependent shutdowns:
# during heavy IBD/background validation, RPC can be unavailable even though
# bitcoind is healthy and will handle SIGTERM cleanly.
ExecStartPre=
ExecStartPre=/usr/bin/test -d /mnt/ssd/bitcoin/bitcoin-core-mainnet
ExecStart=
ExecStart=/usr/local/bin/bitcoind -datadir=/mnt/ssd/bitcoin/bitcoin-core-mainnet -daemon=0
ExecStop=
StandardOutput=null
StandardError=journal
