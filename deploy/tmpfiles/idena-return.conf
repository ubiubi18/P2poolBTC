# The transfer user owns only the inbox. Root owns rollback and transaction state.
d /var/lib/idena-return-inbox 0755 root root -
d /var/lib/idena-return-inbox/current 0700 idena-return idena-return -
d /var/lib/idena-return-backup 0700 root root -
d /var/lib/idena-return-failed 0700 root root -
d /var/lib/idena-return-state 0700 root root -
f /run/lock/idena-return-transfer.lock 0660 root idena-return -
