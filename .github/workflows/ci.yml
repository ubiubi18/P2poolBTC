name: CI

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.2
      - name: Audit Rust dependencies
        run: cargo audit
      - name: Test
        run: cargo test --locked --workspace --all-features
      - name: Build
        run: cargo build --locked --workspace --all-features

  bitcoin-core-consensus:
    name: Bitcoin Core Experiment 2 consensus
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Resolve locked consensus inputs
        id: lock
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/pohw-experiment-2-consensus-identity.py
          python3 - "$GITHUB_OUTPUT" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          lock = json.loads(
              Path("compatibility/experiment-2-bitcoin-core-patch-lock.json")
              .read_text(encoding="utf-8")
          )
          repository = lock["upstream"]["repository"]
          commit = lock["upstream"]["commit"]
          activation_id = lock["network"]["candidate_activation_id"]
          if repository != "https://github.com/bitcoin/bitcoin.git":
              raise SystemExit("Experiment 2 upstream repository is not allowlisted")
          if re.fullmatch(r"[0-9a-f]{40}", commit) is None:
              raise SystemExit("Experiment 2 upstream commit is not immutable")
          if re.fullmatch(r"[0-9a-f]{64}", activation_id) is None:
              raise SystemExit("Experiment 2 activation ID is invalid")
          with Path(sys.argv[1]).open("a", encoding="utf-8") as output:
              output.write(f"upstream_repository={repository}\n")
              output.write(f"upstream_commit={commit}\n")
              output.write(f"activation_id={activation_id}\n")
          PY
      - name: Install Bitcoin Core build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            libboost-dev \
            libevent-dev \
            libsqlite3-dev \
            libzmq3-dev \
            ninja-build \
            pkgconf
      - name: Fetch exact Bitcoin Core source
        shell: bash
        env:
          UPSTREAM_REPOSITORY: ${{ steps.lock.outputs.upstream_repository }}
          UPSTREAM_COMMIT: ${{ steps.lock.outputs.upstream_commit }}
        run: |
          set -euo pipefail
          source_dir="$RUNNER_TEMP/bitcoin-core-upstream"
          mkdir -m 0700 -- "$source_dir"
          git -C "$source_dir" init --quiet
          git -C "$source_dir" remote add origin "$UPSTREAM_REPOSITORY"
          git -C "$source_dir" fetch --no-tags --depth=1 origin "$UPSTREAM_COMMIT"
          git -C "$source_dir" checkout --quiet --detach FETCH_HEAD
          test "$(git -C "$source_dir" rev-parse HEAD)" = "$UPSTREAM_COMMIT"
          test -z "$(git -C "$source_dir" status --porcelain=v1 --untracked-files=all)"
      - name: Apply and verify locked patch series
        shell: bash
        run: |
          set -euo pipefail
          scripts/pohw-verify-bitcoin-core-source.sh \
            --source-dir "$RUNNER_TEMP/bitcoin-core-upstream" \
            --snapshot-dir "$RUNNER_TEMP/bitcoin-core-patched" \
            --snapshot-metadata "$RUNNER_TEMP/bitcoin-core-source.json" \
            --manifest compatibility/experiment-2-bitcoin-core-patch-lock.json
      - name: Configure patched Bitcoin Core
        shell: bash
        env:
          POHW2_ACTIVATION_ID: ${{ steps.lock.outputs.activation_id }}
        run: |
          set -euo pipefail
          cmake \
            -S "$RUNNER_TEMP/bitcoin-core-patched" \
            -B "$RUNNER_TEMP/bitcoin-core-build" \
            -G Ninja \
            -DBUILD_GUI=OFF \
            -DBUILD_TESTS=ON \
            -DBUILD_BENCH=OFF \
            -DBUILD_FUZZ_BINARY=OFF \
            -DENABLE_IPC=OFF \
            "-DPOHW2_ACTIVATION_ID=$POHW2_ACTIVATION_ID"
      - name: Build patched Bitcoin Core
        run: cmake --build "$RUNNER_TEMP/bitcoin-core-build" --parallel 4
      - name: Test consensus identity authorization
        shell: bash
        run: |
          set -euo pipefail
          test_tmp="$RUNNER_TEMP/bitcoin-core-test-tmp"
          mkdir -m 0700 -- "$test_tmp"
          TMPDIR="$test_tmp" \
            "$RUNNER_TEMP/bitcoin-core-build/bin/test_bitcoin" \
            --run_test=pohw_identity_auth_tests \
            --log_level=message
      - name: Test replay protection and identity authorization end to end
        shell: bash
        run: |
          set -euo pipefail
          test_tmp="$RUNNER_TEMP/bitcoin-core-functional-tests"
          mkdir -m 0700 -- "$test_tmp"
          runner="$RUNNER_TEMP/bitcoin-core-patched/test/functional/test_runner.py"
          config="$RUNNER_TEMP/bitcoin-core-build/test/config.ini"
          tests="$RUNNER_TEMP/bitcoin-core-patched/test/functional"
          TMPDIR="$test_tmp" python3 "$runner" \
            feature_pohw_replay.py \
            --jobs=1 \
            --tmpdirprefix="$test_tmp" \
            --configfile="$config" \
            --testsdir="$tests"
          TMPDIR="$test_tmp" python3 "$runner" \
            feature_pohw_identity_auth.py \
            --jobs=1 \
            --tmpdirprefix="$test_tmp" \
            --configfile="$config" \
            --testsdir="$tests"
      - name: Run complete configured Bitcoin Core test suite
        run: >-
          ctest --test-dir "$RUNNER_TEMP/bitcoin-core-build"
          --output-on-failure --parallel 4

  python-and-shell:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Verify Idena legacy compatibility lock
        run: python scripts/pohw-idena-compatibility-lock.py
      - name: Verify Experiment 1 manifest and provenance files
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/pohw-experiment-1-manifest.py verify \
            compatibility/experiment-1-full-consensus.json --repo-root .
          required=(
            EXPERIMENT-1.md
            SECURITY.md
            compatibility/experiment-1-full-consensus.json
            compatibility/experiment-1-onboarding-profile.json
            compatibility/experiment-1-miner-registry-candidate.json
            compatibility/governance-build-plan-v1.json
            compatibility/governance-fork-lock.json
            compatibility/governance-fork-runtime-tests/idena-go/governance_contract_integration_test.go
            vendor/bitcoin-core/patches/bitcoin-core-v31.1-pohw-experiment-1.patch
            scripts/pohw-experiment-1-manifest.py
            scripts/pohw-community-onboarding.py
            scripts/pohw-community-onboard.sh
            scripts/pohw-community-onboard.ps1
            scripts/pohw-bootstrap-bitcoin-core-fork.sh
            scripts/pohw-install-experiment-1-adapter.sh
            scripts/pohw-activate-experiment-1-profile.py
            scripts/pohw-host-firewall.py
            scripts/pohw-governance-runtime-gate.py
            scripts/pohw-miner-registry-runtime-gate.py
            contracts/idena-pohw-miner-registry/package.json
            contracts/idena-pohw-miner-registry/pnpm-lock.yaml
            compatibility/experiment-1-runtime-tests/idena-go/miner_registry_contract_integration_test.go
            COMMUNITY-EXPERIMENT-1.md
            COMMUNITY-QUICKSTART.md
            schemas/pohw-community-onboarding-profile-v1.schema.json
            schemas/pohw-community-onboarding-receipt-v1.schema.json
            deploy/bitcoin/bitcoin-pohw-experiment-1.conf.example
            deploy/pohw-experiment-1.env.example
            deploy/systemd/bitcoind-pohw-experiment-1.service
            deploy/systemd/pohw-gossip-experiment-1.conf
            deploy/systemd/pohw-mining-experiment-1.conf
            deploy/systemd/pohw-host-firewall.service
            deploy/nftables/pohw-host-firewall.json.example
            tests/test_pohw_experiment_1.py
            tests/test_pohw_community_onboarding.py
            tests/test_pohw_install_experiment_1_adapter.py
            tests/test_pohw_experiment_1_profile.py
            tests/test_pohw_bootstrap_ci_security.py
            tests/test_pohw_host_firewall.py
            tests/test_pohw_governance_runtime_gate.py
            tests/test_pohw_miner_registry_runtime_gate.py
          )
          git ls-files --error-unmatch -- "${required[@]}" >/dev/null
          for path in "${required[@]}"; do test -s "$path"; done
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("compatibility/experiment-1-full-consensus.json").read_text())
          activation = manifest["activation_id"]
          datadir = (
              "/srv/sharechain/"
              + manifest["network"]["data_subdirectory"]
              + "-"
              + activation[:8]
          )
          values = {}
          for line in Path("deploy/pohw-experiment-1.env.example").read_text().splitlines():
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              if key in values:
                  raise SystemExit(f"duplicate Experiment 1 environment key: {key}")
              values[key] = value
          expected = {
              "POHW_GOSSIP_NETWORK_ID": activation,
              "POHW_DATADIR": datadir,
              "POHW_STRATUM_BLOCK_CANDIDATE_DIR": datadir + "/block-candidates",
              "POHW_PAYOUT_CANDIDATE_DIR": datadir + "/payout-candidates",
          }
          for key, value in expected.items():
              if values.get(key) != value:
                  raise SystemExit(f"Experiment 1 environment example drift: {key}")
          PY
      - name: Validate governance build plan and local lock digests
        run: |
          python3 scripts/pohw-governance-build-evidence.py validate-plan \
            --plan compatibility/governance-build-plan-v1.json
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          plan = json.loads(Path("compatibility/governance-build-plan-v1.json").read_text())
          checked = 0
          for target in plan["targets"]:
              for lock in target["dependencyLocks"]:
                  if lock["repository"] != "P2poolBTC":
                      continue
                  path = Path(lock["path"])
                  if path.is_absolute() or ".." in path.parts or not path.is_file():
                      raise SystemExit(f"unsafe or missing P2poolBTC lock path: {path}")
                  actual = hashlib.sha256(path.read_bytes()).hexdigest()
                  if actual != lock["sha256"]:
                      raise SystemExit(
                          f"governance build-plan lock drift: {target['id']}:{path}"
                      )
                  checked += 1
          if checked == 0:
              raise SystemExit("governance build plan contains no local lock digests")
          print(f"verified {checked} local governance build-plan lock digests")
          PY
      - name: Test host tooling
        run: python -m unittest discover -s tests -p 'test_*.py' -v
      - name: Test reward indexer
        run: python -m unittest discover -s pohw_idena_rpc/tests -p 'test_*.py' -v
      - name: Check Python syntax
        run: python -m compileall -q scripts pohw_idena_rpc tests
      - name: Check shell syntax
        run: bash -n scripts/*.sh
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck
      - name: Lint shell scripts
        run: shellcheck scripts/*.sh

  javascript:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24.18.0"
      - name: Install dashboard dependencies
        run: corepack pnpm@11.11.0 --dir ui/pohw-dashboard install --frozen-lockfile
      - name: Audit dashboard dependencies
        run: corepack pnpm@11.11.0 --dir ui/pohw-dashboard audit --prod
      - name: Build dashboard
        run: corepack pnpm@11.11.0 --dir ui/pohw-dashboard build
      - name: Install contract dependencies
        run: corepack pnpm@11.11.0 --dir contracts/idena-snapshot-registry install --frozen-lockfile
      - name: Audit contract dependencies
        run: corepack pnpm@11.11.0 --dir contracts/idena-snapshot-registry audit --prod
      - name: Test contract
        run: corepack pnpm@11.11.0 --dir contracts/idena-snapshot-registry test
      - name: Install governance contract dependencies
        run: corepack pnpm@11.11.0 --dir contracts/idena-code-governance install --frozen-lockfile
      - name: Audit governance contract dependencies
        run: corepack pnpm@11.11.0 --dir contracts/idena-code-governance audit --prod
      - name: Build governance contract
        run: corepack pnpm@11.11.0 --dir contracts/idena-code-governance build
      - name: Test governance contract
        run: corepack pnpm@11.11.0 --dir contracts/idena-code-governance test
      - name: Verify governance contract lock
        run: >-
          python3 scripts/pohw-governance-runtime-gate.py
          --verify-artifact-only
          --fork-candidate-lock compatibility/governance-day-fork-candidate-lock.json
      - name: Install miner-registry dependencies
        run: corepack pnpm@11.11.0 --dir contracts/idena-pohw-miner-registry install --frozen-lockfile
      - name: Audit miner-registry dependencies
        run: corepack pnpm@11.11.0 --dir contracts/idena-pohw-miner-registry audit --prod
      - name: Build miner-registry contract
        run: corepack pnpm@11.11.0 --dir contracts/idena-pohw-miner-registry build
      - name: Test miner-registry contract
        run: corepack pnpm@11.11.0 --dir contracts/idena-pohw-miner-registry test

  governance-production-runtime:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate current locked component revisions
        id: governance_lock
        shell: bash
        run: |
          set -euo pipefail
          python3 - "$RUNNER_TEMP/governance-components.tsv" "$GITHUB_OUTPUT" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          lock = json.loads(Path("compatibility/stack-lock.json").read_text())
          candidate = json.loads(
              Path("compatibility/governance-day-fork-candidate-lock.json").read_text()
          )
          commit = re.compile(r"^[0-9a-f]{40}$")
          components = lock.get("components")
          if not isinstance(components, list) or not components:
              raise SystemExit("governance lock has no components")
          lines = []
          seen = set()
          for component in components:
              name = component.get("name")
              repository = component.get("repository")
              revision = component.get("commit")
              if (
                  not isinstance(name, str)
                  or not re.fullmatch(r"[a-z0-9][a-z0-9-]*", name)
                  or name in seen
                  or not isinstance(repository, str)
                  or not re.fullmatch(
                      r"https://github\.com/ubiubi18/[A-Za-z0-9_.-]+\.git",
                      repository,
                  )
                  or not isinstance(revision, str)
                  or not commit.fullmatch(revision)
              ):
                  raise SystemExit(f"invalid or moving component pin: {name!r}")
              seen.add(name)
              lines.append(f"{name}\t{repository}\t{revision}\n")
          Path(sys.argv[1]).write_text("".join(lines), encoding="utf-8")
          stack_toolchains = lock.get("toolchains", {})
          candidate_toolchains = candidate.get("toolchains", {})
          for name in ("go", "rust", "node", "npm"):
              if stack_toolchains.get(name) != candidate_toolchains.get(name):
                  raise SystemExit(f"governance candidate {name} toolchain drift")
          go_version = candidate_toolchains.get("go")
          if not isinstance(go_version, str) or not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", go_version):
              raise SystemExit("governance lock has no exact Go toolchain")
          rust_version = candidate_toolchains.get("rust")
          node_version = candidate_toolchains.get("node")
          pnpm_version = candidate_toolchains.get("pnpm")
          for name, version in (
              ("rust", rust_version),
              ("node", node_version),
              ("pnpm", pnpm_version),
          ):
              if not isinstance(version, str) or not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", version):
                  raise SystemExit(f"governance lock has no exact {name} toolchain")
          with Path(sys.argv[2]).open("a", encoding="utf-8") as output:
              output.write(f"go_version={go_version}\n")
              output.write(f"rust_version={rust_version}\n")
              output.write(f"node_version={node_version}\n")
              output.write(f"pnpm_version={pnpm_version}\n")
          PY
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ steps.governance_lock.outputs.node_version }}
      - name: Build exact governance contract artifact
        run: |
          corepack pnpm@${{ steps.governance_lock.outputs.pnpm_version }} --dir contracts/idena-code-governance install --frozen-lockfile
          corepack pnpm@${{ steps.governance_lock.outputs.pnpm_version }} --dir contracts/idena-code-governance build
          corepack pnpm@${{ steps.governance_lock.outputs.pnpm_version }} --dir contracts/idena-pohw-miner-registry install --frozen-lockfile
          corepack pnpm@${{ steps.governance_lock.outputs.pnpm_version }} --dir contracts/idena-pohw-miner-registry build
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ steps.governance_lock.outputs.go_version }}
          cache: false
      - name: Check out exact locked component commits
        shell: bash
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/governance-components"
          mkdir -p "$root"
          while IFS=$'\t' read -r name repository revision; do
            destination="$root/$name"
            git init -q "$destination"
            git -C "$destination" remote add origin "$repository"
            git -C "$destination" fetch -q --depth=1 origin "$revision"
            test "$(git -C "$destination" rev-parse FETCH_HEAD)" = "$revision"
            git -C "$destination" checkout -q --detach "$revision"
            test "$(git -C "$destination" rev-parse HEAD)" = "$revision"
            test -z "$(git -C "$destination" status --porcelain=v1 --untracked-files=all)"
          done < "$RUNNER_TEMP/governance-components.tsv"
      - name: Run miner-registry production runtime gate on exact legacy node
        shell: bash
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/governance-components"
          go -C "$root/idena-go" mod download
          python3 scripts/pohw-miner-registry-runtime-gate.py \
            --idena-go "$root/idena-go"
      - name: Apply exact inactive Governance Day runtime candidate
        shell: bash
        run: |
          set -euo pipefail
          python3 - "$RUNNER_TEMP/governance-candidate-patches.tsv" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path, PurePosixPath

          candidate = json.loads(
              Path("compatibility/governance-day-fork-candidate-lock.json").read_text()
          )
          if (
              candidate.get("status") != "experimental-uncommitted-candidate"
              or candidate.get("authorizedForDeployment") is not False
              or candidate.get("activation", {}).get("enabled") is not False
          ):
              raise SystemExit("governance fork candidate lost its inactive interlock")
          rows = []
          for component in candidate.get("components", []):
              patch = component.get("patch")
              if patch is None:
                  continue
              name = component.get("name")
              path = patch.get("path")
              relative = PurePosixPath(path) if isinstance(path, str) else None
              if (
                  name not in {"idena-go", "idena-wasm", "idena-wasm-binding"}
                  or relative is None
                  or relative.is_absolute()
                  or any(part in {"", ".", ".."} for part in relative.parts)
                  or not re.fullmatch(r"[A-Za-z0-9._/+@-]+", path)
              ):
                  raise SystemExit(f"invalid candidate patch descriptor: {name!r}")
              rows.append(f"{name}\t{path}\n")
          if {row.split("\t", 1)[0] for row in rows} != {
              "idena-go",
              "idena-wasm",
              "idena-wasm-binding",
          }:
              raise SystemExit("candidate patch set is incomplete")
          Path(sys.argv[1]).write_text("".join(sorted(rows)), encoding="utf-8")
          PY
          while IFS=$'\t' read -r name patch; do
            git -C "$RUNNER_TEMP/governance-components/$name" apply --index --check "$GITHUB_WORKSPACE/$patch"
            git -C "$RUNNER_TEMP/governance-components/$name" apply --index "$GITHUB_WORKSPACE/$patch"
          done < "$RUNNER_TEMP/governance-candidate-patches.tsv"
      - name: Verify deterministic fork-candidate source CIDs
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "${{ steps.governance_lock.outputs.rust_version }}" --profile minimal
          cargo +"${{ steps.governance_lock.outputs.rust_version }}" build \
            --locked \
            -p governance-cli
          python3 scripts/pohw-governance-runtime-gate.py \
            --idena-go "$RUNNER_TEMP/governance-components/idena-go" \
            --fork-candidate-lock compatibility/governance-day-fork-candidate-lock.json \
            --component-repo idena-wasm-binding="$RUNNER_TEMP/governance-components/idena-wasm-binding" \
            --component-repo idena-wasm="$RUNNER_TEMP/governance-components/idena-wasm" \
            --governance-cli "$GITHUB_WORKSPACE/target/debug/pohw-governance" \
            --verify-candidate-sources-only
      - name: Build candidate native WASM runtime and local binding
        shell: bash
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/governance-components"
          cargo +"${{ steps.governance_lock.outputs.rust_version }}" build \
            --manifest-path "$root/idena-wasm/Cargo.toml" \
            --release --locked
          archive="$root/idena-wasm-binding/lib/libidena_wasm_linux_amd64.a"
          install -m 0644 "$root/idena-wasm/target/release/libidena_wasm.a" "$archive"
          python3 - "$root/idena-wasm-binding/lib/SHA256SUMS" "$archive" <<'PY'
          import hashlib
          import sys
          from pathlib import Path

          checksums = Path(sys.argv[1])
          archive = Path(sys.argv[2])
          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          rows = checksums.read_text(encoding="ascii").splitlines()
          if sum(row.endswith("  " + archive.name) for row in rows) != 1:
              raise SystemExit("candidate archive checksum row is missing or duplicated")
          checksums.write_text(
              "\n".join(
                  f"{digest}  {archive.name}"
                  if row.endswith("  " + archive.name)
                  else row
                  for row in rows
              )
              + "\n",
              encoding="ascii",
          )
          PY
          GOWORK=off go -C "$root/idena-go" mod edit \
            -replace="github.com/idena-network/idena-wasm-binding=$root/idena-wasm-binding"
          (
            cd "$root/idena-wasm-binding"
            GOWORK=off go test ./...
          )
      - name: Run production Idena WASM fork-candidate compatibility gate
        run: |
          python3 scripts/pohw-governance-runtime-gate.py \
            --idena-go "$RUNNER_TEMP/governance-components/idena-go" \
            --fork-candidate-lock compatibility/governance-day-fork-candidate-lock.json \
            --component-repo idena-wasm-binding="$RUNNER_TEMP/governance-components/idena-wasm-binding" \
            --component-repo idena-wasm="$RUNNER_TEMP/governance-components/idena-wasm"
      - name: Confirm governance release eligibility or inactive interlock
        id: governance_release
        shell: bash
        run: |
          set -euo pipefail
          python3 - "$GITHUB_OUTPUT" <<'PY'
          import json
          import sys
          from pathlib import Path

          lock = json.loads(Path("compatibility/governance-fork-lock.json").read_text())
          prototype = lock.get("governancePrototype", {})
          source_status = prototype.get("sourceStatus")
          eligible = source_status == "canonical-locked-source"
          if not eligible:
              allowed = {"uncommitted-local-prototype", "committed-experimental-prototype"}
              activation = lock.get("activation", {})
              if (
                  source_status not in allowed
                  or lock.get("status") != "experimental-inactive"
                  or prototype.get("canonicalAuthorization") != "none"
                  or activation.get("enabled") is not False
                  or activation.get("liveCanonicalReferenceChangesPermitted") is not False
              ):
                  raise SystemExit("noncanonical governance source lacks the inactive safety interlock")
              print(
                  "governance release gate remains blocked by the explicit inactive prototype lock; "
                  "production-runtime compatibility passed"
              )
          with Path(sys.argv[1]).open("a", encoding="utf-8") as output:
              output.write(f"eligible={'true' if eligible else 'false'}\n")
          PY
      - name: Run release-grade locked-source gate
        if: steps.governance_release.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          args=()
          while IFS=$'\t' read -r name _ _; do
            if [[ "$name" != idena-go ]]; then
              args+=(--component-repo "$name=$RUNNER_TEMP/governance-components/$name")
            fi
          done < "$RUNNER_TEMP/governance-components.tsv"
          python3 scripts/pohw-governance-runtime-gate.py \
            --idena-go "$RUNNER_TEMP/governance-components/idena-go" \
            --require-locked-sources "${args[@]}"

  secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
