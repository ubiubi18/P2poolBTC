name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.2
      - name: Audit Rust dependencies
        run: cargo audit
      - name: Test
        run: cargo test --workspace

  python-and-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Verify Idena legacy compatibility lock
        run: python scripts/pohw-idena-compatibility-lock.py
      - name: Test host tooling
        run: python -m unittest discover -s tests -p 'test_*.py' -v
      - name: Test reward indexer
        run: python -m unittest discover -s pohw_idena_rpc/tests -p 'test_*.py' -v
      - name: Check Python syntax
        run: python -m compileall -q scripts pohw_idena_rpc tests
      - name: Check shell syntax
        run: bash -n scripts/*.sh
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck
      - name: Lint shell scripts
        run: shellcheck scripts/*.sh

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.18.0"
      - name: Install dashboard dependencies
        run: corepack pnpm@10.13.1 --dir ui/pohw-dashboard install --frozen-lockfile
      - name: Audit dashboard dependencies
        run: corepack pnpm@10.13.1 --dir ui/pohw-dashboard audit --prod
      - name: Build dashboard
        run: corepack pnpm@10.13.1 --dir ui/pohw-dashboard build
      - name: Install contract dependencies
        run: corepack pnpm@10.13.1 --dir contracts/idena-snapshot-registry install --frozen-lockfile
      - name: Audit contract dependencies
        run: corepack pnpm@10.13.1 --dir contracts/idena-snapshot-registry audit --prod
      - name: Test contract
        run: corepack pnpm@10.13.1 --dir contracts/idena-snapshot-registry test

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
