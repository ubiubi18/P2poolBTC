name: Experiment 1 independent verification
description: Report a source review, independent build, or second-host readiness result without publishing secrets.
title: "[Experiment 1 verification] "
body:
  - type: markdown
    attributes:
      value: |
        This form is public. Never include identity or wallet addresses, keys, signatures, API keys, RPC cookies, peer endpoints, IP addresses, hostnames, usernames, local filesystem paths, raw logs, environment files, or unreviewed archives.

        Experiment 1 remains blocked for public joining until the launch-policy verifier reports `ready-for-public-join`. Submitting this form does not authorize identity registration, service startup, peer connection, or mining. Report security findings privately through GitHub Security Advisories.
  - type: dropdown
    id: verification_role
    attributes:
      label: Verification role
      options:
        - Observer or source reviewer
        - Independent miner-registry builder
        - Second-node host operator
    validations:
      required: true
  - type: input
    id: source_cid
    attributes:
      label: Canonical source-tree CID
      description: Paste the CIDv1 base32 source-tree CID from the published ecosystem manifest. Enter Not published for a pre-release source review; a Git commit cannot substitute for this field.
      placeholder: bafy...
    validations:
      required: true
  - type: input
    id: source_car_sha256
    attributes:
      label: Source CAR SHA-256
      description: Paste the independently recomputed lowercase SHA-256 of the deterministic source CAR. Enter Not published only for a pre-release source review.
      placeholder: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Exact reviewed Git commit metadata
      description: Paste only the 40-character public commit ID from `git rev-parse HEAD`. This is mirror metadata and never replaces the source CID.
      placeholder: 0123456789abcdef0123456789abcdef01234567
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Operating system and architecture
      placeholder: Ubuntu 24.04, x86_64
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: Result
      options:
        - review-ready
        - matching-build
        - build-mismatch
        - blocked-public-join
        - host-not-ready
        - verification-failed
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands executed
      description: List only public commands from COMMUNITY-QUICKSTART.md. Replace machine-specific paths with placeholders.
      render: shell
    validations:
      required: true
  - type: textarea
    id: artifact_identity
    attributes:
      label: Public artifact identity
      description: Independent builders may provide only the WASM size, lowercase SHA-256, and raw CID. Other roles should enter Not applicable.
      placeholder: |
        size: 55875
        sha256: 7f5cbf0daeded9bc3ca04ade914e37688edccaa0a8ad025bb74842ec788ad601
        cid: bafkreid7ls7q3lw63g6dzick32iu4n3ir3omvifivubfxn2iilwhrcwwae
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Result summary
      description: Describe the smallest reproducible result without raw logs or private context.
    validations:
      required: true
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Safety acknowledgements
      options:
        - label: I did not include private data, credentials, addresses, signatures, endpoints, or raw logs.
          required: true
        - label: I understand that this report does not satisfy an authenticated governance attestation by itself.
          required: true
        - label: I did not register an identity, start services, connect a peer, or mine while the public interlock was blocked.
          required: true
